<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Personal Sales Tracker</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --arshad-color: #4f46e5; --shahnwaz-color: #10b981; --bg: #f3f4f6; }
        html, body { height: 100%; margin: 0; padding: 0; background: var(--bg); font-family: 'Segoe UI', sans-serif; }
        .container { max-width: 1000px; margin: 0 auto; padding: 15px; display: flex; flex-direction: column; gap: 15px; }

        /* User Specific Header */
        .user-header { 
            display: grid; 
            grid-template-columns: 1fr 1fr auto; 
            gap: 20px; 
            padding: 25px; 
            border-radius: 15px; 
            color: white;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            transition: all 0.4s ease;
        }
        .stat-group { display: flex; flex-direction: column; justify-content: center; }
        .stat-label { font-size: 11px; opacity: 0.8; text-transform: uppercase; font-weight: bold; letter-spacing: 1.5px; }
        .stat-val { font-size: 34px; font-weight: 900; line-height: 1.2; }
        .switch-btn { background: white; color: black; border: none; padding: 10px 20px; border-radius: 30px; font-weight: bold; cursor: pointer; font-size: 12px; }

        .main-grid { display: grid; grid-template-columns: 320px 1fr; gap: 15px; }
        .card { background: white; padding: 20px; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.05); border: 1px solid #e5e7eb; }
        
        form { display: flex; flex-direction: column; gap: 10px; }
        label { font-size: 12px; font-weight: 700; color: #4b5563; }
        input, select, button { padding: 12px; border-radius: 8px; border: 1px solid #d1d5db; font-size: 14px; }
        .submit-btn { background: #1f2937; color: white; border: none; cursor: pointer; font-weight: bold; }
        
        .chart-container { height: 250px; position: relative; margin-top: 10px; }
        
        table { width: 100%; border-collapse: collapse; font-size: 13px; margin-top: 10px; }
        th { text-align: left; padding: 10px; border-bottom: 2px solid #eee; color: #6b7280; font-size: 11px; text-transform: uppercase; }
        td { padding: 12px 10px; border-bottom: 1px solid #f9fafb; }
        
        .history-scroll { max-height: 300px; overflow-y: auto; }
        .status-tag { text-align: center; font-size: 10px; color: #9ca3af; font-weight: bold; }
        
        .btn-del { color: #ef4444; background: none; border: none; cursor: pointer; font-weight: bold; padding: 0 10px; }

        @media (max-width: 800px) { .main-grid, .user-header { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div id="syncStatus" class="status-tag">CLOUD DATA LOADING...</div>

    <div class="user-header" id="userTheme">
        <div class="stat-group">
            <div class="stat-label">Yearly Revenue</div>
            <div id="yearlyTotal" class="stat-val">0</div>
        </div>
        <div class="stat-group">
            <div class="stat-label">This Month (<span id="monthName"></span>)</div>
            <div id="monthlyTotal" class="stat-val">0</div>
        </div>
        <div class="stat-group" style="align-items: flex-end;">
            <div style="font-size: 12px; font-weight: bold; margin-bottom: 5px;">Currently: <span id="userNameDisplay">---</span></div>
            <button class="switch-btn" onclick="toggleUser()">Switch Account</button>
        </div>
    </div>

    <div class="main-grid">
        <div class="card">
            <h3 style="margin:0 0 15px 0;">Add Sales Entry</h3>
            <form id="entryForm">
                <label>Month</label>
                <select id="monthSelect"></select>
                
                <label>Amount</label>
                <input type="number" id="amountInput" required placeholder="Enter Value">
                
                <button type="submit" class="submit-btn" id="saveBtn">Save Record</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin:0 0 5px 0;">Performance Breakdown</h3>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <div class="card" style="grid-column: 1 / -1;">
            <h3 style="margin:0 0 10px 0;">Your Recent Orders</h3>
            <div class="history-scroll">
                <table>
                    <thead>
                        <tr>
                            <th>Order No.</th>
                            <th>Month</th>
                            <th>Amount</th>
                            <th>Action</th>
                        </tr>
                    </thead>
                    <tbody id="historyBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbwHpKRlzGorZnAyY3fQ1IJvjQY1zn-OuAVrpteGtBmFUtJvlDflZQTAQt2qDNqFm_4k-Q/exec";
    const months = ['Jan', 'Feb', 'Mar', 'Apr', 'May', 'Jun', 'Jul', 'Aug', 'Sep', 'Oct', 'Nov', 'Dec'];
    let allOrders = [];
    let chartObj = null;
    let activeUser = localStorage.getItem('trackerUser') || "Arshad";

    async function startApp() {
        // Setup Month List
        const mSel = document.getElementById('monthSelect');
        months.forEach((m, i) => mSel.innerHTML += `<option value="${i}">${m}</option>`);
        mSel.value = new Date().getMonth();
        document.getElementById('monthName').innerText = months[new Date().getMonth()];

        refreshProfile();

        // Load Cloud Data
        try {
            const response = await fetch(G_URL);
            const data = await response.json();
            if (Array.isArray(data)) allOrders = data;
            document.getElementById('syncStatus').innerText = "✓ CLOUD SYNC ACTIVE";
        } catch (e) {
            document.getElementById('syncStatus').innerText = "OFFLINE MODE";
        }
        renderDashboard();
    }

    function refreshProfile() {
        document.getElementById('userNameDisplay').innerText = activeUser;
        const theme = document.getElementById('userTheme');
        if (activeUser === "Arshad") {
            theme.style.backgroundColor = "var(--arshad-color)";
        } else {
            theme.style.backgroundColor = "var(--shahnwaz-color)";
        }
    }

    function toggleUser() {
        activeUser = (activeUser === "Arshad") ? "Shahnwaz" : "Arshad";
        localStorage.setItem('trackerUser', activeUser);
        refreshProfile();
        renderDashboard();
    }

    function renderDashboard() {
        // Filter data for active user only
        const myData = allOrders.filter(o => o.user === activeUser);
        const monthlySums = Array(12).fill(0);
        const currentMonthIdx = new Date().getMonth();

        // Calculate Totals
        let yearlyTotal = 0;
        myData.forEach(o => {
            monthlySums[o.month] += parseFloat(o.amount);
            yearlyTotal += parseFloat(o.amount);
        });

        // Update Header Stats
        document.getElementById('yearlyTotal').innerText = yearlyTotal.toLocaleString();
        document.getElementById('monthlyTotal').innerText = monthlySums[currentMonthIdx].toLocaleString();

        // Update Table
        const tbody = document.getElementById('historyBody');
        tbody.innerHTML = '';
        [...myData].reverse().forEach((o, index) => {
            tbody.innerHTML += `
                <tr>
                    <td>Order #${myData.length - index}</td>
                    <td>${months[o.month]}</td>
                    <td>${parseFloat(o.amount).toLocaleString()}</td>
                    <td><button class="btn-del" onclick="removeEntry(${o.globalId})">Delete</button></td>
                </tr>`;
        });

        // Update Chart
        const ctx = document.getElementById('salesChart').getContext('2d');
        if (chartObj) chartObj.destroy();
        chartObj = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months,
                datasets: [{
                    label: activeUser + "'s Sales",
                    data: monthlySums,
                    backgroundColor: (activeUser === "Arshad") ? '#818cf8' : '#34d399',
                    borderRadius: 5
                }]
            },
            options: { responsive: true, maintainAspectRatio: false }
        });
    }

    document.getElementById('entryForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const amt = document.getElementById('amountInput').value;
        const month = document.getElementById('monthSelect').value;
        
        const newEntry = {
            globalId: Date.now(),
            user: activeUser,
            month: parseInt(month),
            amount: parseFloat(amt)
        };

        allOrders.push(newEntry);
        document.getElementById('amountInput').value = '';
        renderDashboard();
        
        // Sync
        document.getElementById('syncStatus').innerText = "SAVING...";
        try {
            await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(allOrders) });
            document.getElementById('syncStatus').innerText = "✓ SAVED";
        } catch (e) {}
    });

    async function removeEntry(gid) {
        if (confirm("Delete this entry?")) {
            allOrders = allOrders.filter(o => o.globalId !== gid);
            renderDashboard();
            await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(allOrders) });
        }
    }

    startApp();
</script>
</body>
</html>
