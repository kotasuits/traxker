<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Tracker | Arshad & Shahnwaz</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4f46e5; --secondary: #10b981; --bg: #f3f4f6; --card-bg: #ffffff; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); padding: 15px; margin: 0; height: 100vh; overflow-x: hidden; }
        .container { max-width: 1100px; margin: 0 auto; }
        
        /* Dashboard Layout - Fixed Grid */
        .grid { display: grid; grid-template-columns: 320px 1fr; gap: 15px; margin-bottom: 15px; }
        
        .card { background: var(--card-bg); padding: 15px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        
        /* Fix: Lock Chart Height */
        .chart-container { height: 250px; position: relative; }
        
        /* Fix: Scrollable Table Area */
        .table-container { 
            max-height: 400px; 
            overflow-y: auto; 
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        form { display: flex; flex-direction: column; gap: 8px; }
        input, select, button { padding: 10px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        
        table { width: 100%; border-collapse: collapse; background: white; }
        th { position: sticky; top: 0; background: var(--primary); color: white; z-index: 10; padding: 10px; }
        td { padding: 10px; border-bottom: 1px solid #ddd; text-align: left; font-size: 13px; }

        .btn-edit { background: #f59e0b; color:white; border:none; padding: 5px 8px; border-radius:3px; cursor:pointer; margin-right:2px;}
        .btn-del { background: #ef4444; color:white; border:none; padding: 5px 8px; border-radius:3px; cursor:pointer;}
        
        .status { font-size: 0.8em; font-weight: bold; text-align: center; margin-bottom: 10px; }
        
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h2 style="text-align:center; color:var(--primary); margin: 10px 0;">Sales Manager</h2>
    <div id="syncStatus" class="status">Connecting...</div>

    <div class="grid">
        <div class="card">
            <h3 id="formTitle" style="margin-top:0">Create Order</h3>
            <form id="salesForm">
                <input type="hidden" id="editId" value="">
                <label>User:</label>
                <select id="user">
                    <option value="Arshad">Arshad</option>
                    <option value="Shahnwaz">Shahnwaz</option>
                </select>
                
                <label>Month:</label>
                <select id="month"></select>

                <label>Amount:</label>
                <input type="number" id="amount" required placeholder="0.00">
                
                <button type="submit" id="saveBtn">Save & Sync</button>
                <button type="button" id="cancelBtn" style="background:#6b7280; display:none;">Cancel</button>
            </form>
        </div>

        <div class="card">
            <h3 style="margin-top:0">Monthly Overview</h3>
            <div class="chart-container">
                <canvas id="salesChart"></canvas>
            </div>
        </div>

        <div class="card full-width" style="grid-column: 1 / -1;">
            <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
                <h3 style="margin:0">Recent Orders</h3>
                <select id="viewFilter" onchange="updateUI()" style="padding:5px;">
                    <option value="All">All Users</option>
                    <option value="Arshad">Arshad</option>
                    <option value="Shahnwaz">Shahnwaz</option>
                </select>
            </div>
            
            <div class="table-container">
                <table>
                    <thead>
                        <tr>
                            <th>Order</th>
                            <th>User</th>
                            <th>Month</th>
                            <th>Amount</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="orderListBody"></tbody>
                </table>
            </div>
        </div>
    </div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbwHpKRlzGorZnAyY3fQ1IJvjQY1zn-OuAVrpteGtBmFUtJvlDflZQTAQt2qDNqFm_4k-Q/exec";
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let allOrders = []; 
    let chartInstance = null;

    async function init() {
        const mSelect = document.getElementById('month');
        months.forEach((m, i) => mSelect.innerHTML += `<option value="${i}">${m}</option>`);
        mSelect.value = new Date().getMonth();

        if (!localStorage.getItem('trackerUser')) {
            let name = prompt("Who is using this?", "Arshad");
            localStorage.setItem('trackerUser', name || "Arshad");
        }
        document.getElementById('user').value = localStorage.getItem('trackerUser');

        try {
            const resp = await fetch(G_URL);
            const data = await resp.json();
            if (Array.isArray(data)) allOrders = data;
            document.getElementById('syncStatus').innerText = "✓ Synced with Cloud";
        } catch (e) {
            document.getElementById('syncStatus').innerText = "Offline Mode";
        }
        updateUI();
    }

    document.getElementById('salesForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const editId = document.getElementById('editId').value;
        const user = document.getElementById('user').value;
        const month = parseInt(document.getElementById('month').value);
        const amount = parseFloat(document.getElementById('amount').value);

        if (editId) {
            const index = allOrders.findIndex(o => o.globalId == editId);
            allOrders[index].user = user;
            allOrders[index].month = month;
            allOrders[index].amount = amount;
        } else {
            const userOrders = allOrders.filter(o => o.user === user);
            const personalOrderNum = userOrders.length + 1;
            allOrders.push({ globalId: Date.now(), user, personalOrderNum, month, amount });
        }

        resetForm();
        updateUI();
        await syncToCloud();
    });

    async function syncToCloud() {
        document.getElementById('syncStatus').innerText = "Saving...";
        try {
            await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(allOrders) });
            document.getElementById('syncStatus').innerText = "✓ Saved to Cloud";
        } catch (e) { console.error(e); }
    }

    function editOrder(gid) {
        const order = allOrders.find(o => o.globalId == gid);
        document.getElementById('editId').value = order.globalId;
        document.getElementById('user').value = order.user;
        document.getElementById('month').value = order.month;
        document.getElementById('amount').value = order.amount;
        document.getElementById('formTitle').innerText = "Edit Order";
        document.getElementById('saveBtn').innerText = "Update";
        document.getElementById('cancelBtn').style.display = "block";
        window.scrollTo(0,0);
    }

    async function deleteOrder(gid) {
        if(confirm("Delete this order?")) {
            allOrders = allOrders.filter(o => o.globalId != gid);
            ["Arshad", "Shahnwaz"].forEach(u => {
                let count = 1;
                allOrders.filter(o => o.user === u).sort((a,b)=>a.globalId - b.globalId).forEach(o => o.personalOrderNum = count++);
            });
            updateUI();
            await syncToCloud();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('formTitle').innerText = "Create Order";
        document.getElementById('saveBtn').innerText = "Save & Sync";
        document.getElementById('cancelBtn').style.display = "none";
    }

    document.getElementById('cancelBtn').onclick = resetForm;

    function updateUI() {
        const filter = document.getElementById('viewFilter').value;
        const tbody = document.getElementById('orderListBody');
        tbody.innerHTML = '';

        const displayData = [...allOrders].reverse();
        displayData.forEach(o => {
            if (filter !== "All" && o.user !== filter) return;
            tbody.innerHTML += `
                <tr>
                    <td>#${o.personalOrderNum}</td>
                    <td>${o.user}</td>
                    <td>${months[o.month].substring(0,3)}</td>
                    <td>${o.amount}</td>
                    <td>
                        <button class="btn-edit" onclick="editOrder(${o.globalId})">✎</button>
                        <button class="btn-del" onclick="deleteOrder(${o.globalId})">✖</button>
                    </td>
                </tr>`;
        });

        const arshadTotals = Array(12).fill(0);
        const shahnwazTotals = Array(12).fill(0);
        allOrders.forEach(o => {
            if(o.user === "Arshad") arshadTotals[o.month] += o.amount;
            else shahnwazTotals[o.month] += o.amount;
        });

        const ctx = document.getElementById('salesChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months.map(m => m.substring(0,3)),
                datasets: [
                    { label: 'Arshad', data: arshadTotals, backgroundColor: '#4f46e5' },
                    { label: 'Shahnwaz', data: shahnwazTotals, backgroundColor: '#10b981' }
                ]
            },
            options: { 
                responsive: true, 
                maintainAspectRatio: false,
                scales: { y: { beginAtZero: true } }
            }
        });
    }

    init();
</script>
</body>
</html>
