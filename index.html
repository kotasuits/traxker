<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sales Tracker | Arshad & Shahnwaz</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        :root { --primary: #4f46e5; --bg: #f3f4f6; --card-bg: #ffffff; --text: #1f2937; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); padding: 20px; margin: 0; }
        .container { max-width: 1100px; margin: 0 auto; }
        .grid { display: grid; grid-template-columns: 350px 1fr; gap: 20px; }
        .card { background: var(--card-bg); padding: 20px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); margin-bottom: 20px; }
        .full-width { grid-column: 1 / -1; }
        form { display: flex; flex-direction: column; gap: 10px; }
        input, select, button { padding: 12px; border-radius: 5px; border: 1px solid #ccc; font-size: 14px; }
        button { background: var(--primary); color: white; border: none; cursor: pointer; font-weight: bold; }
        .btn-edit { background: #f59e0b; padding: 5px 10px; font-size: 12px; margin-right: 5px; }
        .btn-del { background: #ef4444; padding: 5px 10px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { padding: 12px; border-bottom: 1px solid #ddd; text-align: left; }
        th { background: var(--primary); color: white; }
        .status { font-size: 0.85em; margin-bottom: 10px; font-weight: bold; }
        @media (max-width: 850px) { .grid { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <h1 style="text-align:center; color:var(--primary)">Sales Order Manager</h1>
    <div id="syncStatus" class="status" style="text-align: center;">Initializing...</div>

    <div class="grid">
        <div class="card">
            <h2 id="formTitle">Add New Order</h2>
            <form id="salesForm">
                <input type="hidden" id="editId" value="">
                <label>Salesperson:</label>
                <select id="user"><option value="Arshad">Arshad</option><option value="Shahnwaz">Shahnwaz</option></select>
                
                <label>Month:</label>
                <select id="month"></select> <label>Amount:</label>
                <input type="number" id="amount" required placeholder="Enter Amount">
                
                <button type="submit" id="saveBtn">Save Order</button>
                <button type="button" id="cancelBtn" style="background:#6b7280; display:none;">Cancel Edit</button>
            </form>
        </div>

        <div class="card">
            <h2>Monthly Performance</h2>
            <canvas id="salesChart" height="150"></canvas>
        </div>

        <div class="card full-width">
            <h2>Recent Orders</h2>
            <table id="orderTable">
                <thead>
                    <tr>
                        <th>Order ID</th>
                        <th>User</th>
                        <th>Month</th>
                        <th>Amount</th>
                        <th>Actions</th>
                    </tr>
                </thead>
                <tbody id="orderListBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const G_URL = "https://script.google.com/macros/s/AKfycbwHpKRlzGorZnAyY3fQ1IJvjQY1zn-OuAVrpteGtBmFUtJvlDflZQTAQt2qDNqFm_4k-Q/exec";
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    let allOrders = []; // This will store our objects: {id, user, monthIndex, amount}
    let chartInstance = null;

    // 1. Setup & Load
    async function init() {
        // Populate Month Dropdown
        const mSelect = document.getElementById('month');
        months.forEach((m, i) => mSelect.innerHTML += `<option value="${i}">${m}</option>`);
        mSelect.value = new Date().getMonth();

        // User Prompt
        if (!localStorage.getItem('trackerUser')) {
            let name = prompt("Who is using this?", "Arshad");
            localStorage.setItem('trackerUser', name || "Arshad");
        }
        document.getElementById('user').value = localStorage.getItem('trackerUser');

        // Fetch from Cloud
        try {
            const resp = await fetch(G_URL);
            const data = await resp.json();
            if (Array.isArray(data)) allOrders = data;
            document.getElementById('syncStatus').innerText = "✓ Synced with Cloud";
            updateUI();
        } catch (e) {
            document.getElementById('syncStatus').innerText = "Working Locally (Offline)";
            updateUI();
        }
    }

    // 2. Save Order
    document.getElementById('salesForm').addEventListener('submit', async (e) => {
        e.preventDefault();
        const id = document.getElementById('editId').value;
        const user = document.getElementById('user').value;
        const month = parseInt(document.getElementById('month').value);
        const amount = parseFloat(document.getElementById('amount').value);

        if (id) {
            // Edit existing
            const index = allOrders.findIndex(o => o.id == id);
            allOrders[index] = { id: parseInt(id), user, month, amount };
        } else {
            // Add new
            const newId = allOrders.length > 0 ? Math.max(...allOrders.map(o => o.id)) + 1 : 1;
            allOrders.push({ id: newId, user, month, amount });
        }

        resetForm();
        updateUI();
        await syncToCloud();
    });

    // 3. Sync to Google
    async function syncToCloud() {
        document.getElementById('syncStatus').innerText = "Saving to Cloud...";
        try {
            await fetch(G_URL, { method: 'POST', mode: 'no-cors', body: JSON.stringify(allOrders) });
            document.getElementById('syncStatus').innerText = "✓ Saved Successfully";
        } catch (e) { console.error(e); }
    }

    // 4. Edit/Delete Logic
    function editOrder(id) {
        const order = allOrders.find(o => o.id == id);
        document.getElementById('editId').value = order.id;
        document.getElementById('user').value = order.user;
        document.getElementById('month').value = order.month;
        document.getElementById('amount').value = order.amount;
        
        document.getElementById('formTitle').innerText = "Editing Order #" + id;
        document.getElementById('saveBtn').innerText = "Update Order";
        document.getElementById('cancelBtn').style.display = "block";
    }

    async function deleteOrder(id) {
        if(confirm("Delete Order #" + id + "?")) {
            allOrders = allOrders.filter(o => o.id != id);
            updateUI();
            await syncToCloud();
        }
    }

    function resetForm() {
        document.getElementById('editId').value = "";
        document.getElementById('amount').value = "";
        document.getElementById('formTitle').innerText = "Add New Order";
        document.getElementById('saveBtn').innerText = "Save Order";
        document.getElementById('cancelBtn').style.display = "none";
    }

    document.getElementById('cancelBtn').onclick = resetForm;

    // 5. UI Updates
    function updateUI() {
        // Update Table (Newest first)
        const tbody = document.getElementById('orderListBody');
        tbody.innerHTML = '';
        [...allOrders].reverse().forEach(o => {
            tbody.innerHTML += `
                <tr>
                    <td>Order ${o.id}</td>
                    <td>${o.user}</td>
                    <td>${months[o.month]}</td>
                    <td>${o.amount.toLocaleString()}</td>
                    <td>
                        <button class="btn-edit" onclick="editOrder(${o.id})">Edit</button>
                        <button class="btn-del" onclick="deleteOrder(${o.id})">Delete</button>
                    </td>
                </tr>`;
        });

        // Update Chart
        const arshadTotals = Array(12).fill(0);
        const shahnwazTotals = Array(12).fill(0);
        
        allOrders.forEach(o => {
            if(o.user === "Arshad") arshadTotals[o.month] += o.amount;
            else shahnwazTotals[o.month] += o.amount;
        });

        const ctx = document.getElementById('salesChart').getContext('2d');
        if (chartInstance) chartInstance.destroy();
        chartInstance = new Chart(ctx, {
            type: 'bar',
            data: {
                labels: months.map(m => m.substring(0,3)),
                datasets: [
                    { label: 'Arshad', data: arshadTotals, backgroundColor: '#4f46e5' },
                    { label: 'Shahnwaz', data: shahnwazTotals, backgroundColor: '#10b981' }
                ]
            }
        });
    }

    init();
</script>
</body>
</html>
